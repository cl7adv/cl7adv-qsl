<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QSL Caribe - Descarga tus QSLs</title>
    <!-- Google Fonts para estilo tropical -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet" />
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* --- RESET Y ESTILOS GLOBALES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffe5b4 0%, #ffd699 50%, #f9c07a 100%);
            font-family: 'Nunito', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Decoración de palmeras (solo CSS) */
        body::before,
        body::after {
            content: "🌴";
            font-size: 6rem;
            position: absolute;
            bottom: 20px;
            opacity: 0.2;
            transform: rotate(10deg);
            user-select: none;
            pointer-events: none;
        }
        body::before {
            left: 20px;
            transform: rotate(-10deg);
        }
        body::after {
            right: 20px;
            transform: rotate(20deg);
        }

        /* --- TARJETA PRINCIPAL --- */
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 60px 60px 40px 40px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), 0 8px 16px rgba(0, 0, 0, 0.1);
            border: 3px solid #ffffff88;
            position: relative;
            transition: 0.3s;
        }

        /* --- ENCABEZADO --- */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3rem;
            color: #1e6f5c;
            text-shadow: 4px 4px 0 #f9c07a, 0 8px 12px rgba(0,0,0,0.1);
            letter-spacing: 2px;
            word-break: break-word;
        }

        .header .subtitle {
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            color: #c44536;
            background: #fde6c4;
            display: inline-block;
            padding: 0.2rem 2rem;
            border-radius: 40px;
            margin-top: 0.2rem;
            box-shadow: inset 0 -3px 0 #b35d3a;
        }

        .header .sun {
            font-size: 2.5rem;
            display: block;
            margin-top: -0.5rem;
        }

        /* --- BUSCADOR --- */
        .search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0 2rem;
        }

        .search-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
        }

        .search-box input {
            flex: 1 1 200px;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 50px;
            background: #fef9f0;
            font-size: 1.2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            color: #1e3d3a;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05), inset 0 2px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: 2px solid transparent;
        }

        .search-box input:focus {
            outline: 2px solid #f9a825;
            background: #ffffff;
            box-shadow: 0 8px 16px rgba(249, 168, 37, 0.2);
        }

        .search-box input::placeholder {
            text-transform: none;
            font-weight: 400;
            color: #a28b7a;
            letter-spacing: 0;
        }

        .search-box button {
            padding: 0.9rem 2.2rem;
            border: none;
            border-radius: 50px;
            background: #f9a825;
            color: #1e3d3a;
            font-family: 'Fredoka One', cursive;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #c47d1a, 0 4px 12px rgba(249, 168, 37, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #c47d1a, 0 8px 20px rgba(249, 168, 37, 0.5);
        }

        .search-box button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #c47d1a;
        }

        .search-box button i {
            font-size: 1.2rem;
        }

        /* --- MENSAJE DE AYUDA --- */
        .helper {
            font-size: 0.95rem;
            color: #4d3e34;
            background: #fcf3e6cc;
            padding: 0.3rem 1.5rem;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }

        .helper i {
            color: #c44536;
            margin-right: 6px;
        }

        /* --- RESULTADO --- */
        .result-container {
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #ffffffcc;
            border-radius: 40px;
            padding: 1.5rem;
            margin: 1rem 0 1.5rem;
            box-shadow: inset 0 0 0 2px #ffffff, 0 8px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .result-container .message {
            font-size: 1.3rem;
            color: #2e5d4e;
            text-align: center;
            padding: 1rem;
        }

        .result-container .message i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
            color: #f9a825;
        }

        .result-container .qsl-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .result-container .qsl-card img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            border: 4px solid #ffffff;
            transition: 0.3s;
            object-fit: contain;
            background: #f3ede7;
        }

        .result-container .qsl-card img:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3);
        }

        .result-container .qsl-card .download-btn {
            background: #1e6f5c;
            color: white;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-family: 'Fredoka One', cursive;
            font-size: 1.2rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 0 #0f4a3d, 0 4px 12px rgba(30, 111, 92, 0.3);
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .result-container .qsl-card .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #0f4a3d, 0 8px 20px rgba(30, 111, 92, 0.4);
        }

        .result-container .qsl-card .download-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #0f4a3d;
        }

        /* --- FOOTER / FIRMA --- */
        .footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.9rem;
            color: #3b2c22;
            border-top: 2px dashed #dbb48b;
            padding-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .footer .creator {
            font-family: 'Pacifico', cursive;
            font-size: 1.4rem;
            color: #a64b2a;
        }

        .footer .creator span {
            background: #fde6c4;
            padding: 0 0.8rem;
            border-radius: 30px;
        }

        .footer .collab {
            font-weight: 700;
            color: #1e6f5c;
        }

        .footer .collab i {
            color: #f9a825;
            margin: 0 4px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .card {
                padding: 1.8rem 1.2rem;
                border-radius: 40px;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .search-box input {
                font-size: 1rem;
                padding: 0.7rem 1.2rem;
            }
            .search-box button {
                font-size: 1rem;
                padding: 0.7rem 1.5rem;
            }
            .result-container .qsl-card img {
                max-height: 250px;
            }
            .footer .creator {
                font-size: 1.1rem;
            }
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .search-box {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                text-align: center;
            }
        }

        /* Animación sutil de olas */
        .wave {
            animation: wave 3s ease-in-out infinite;
        }
        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(6deg); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- ENCABEZADO -->
        <div class="header">
            <span class="sun wave">🌞</span>
            <h1>QSL Caribe</h1>
            <div class="subtitle">Descarga tus QSLs</div>
        </div>

        <!-- BUSCADOR -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="callsignInput" placeholder="Ej. CM7ADV" maxlength="10" autofocus />
                <button id="searchBtn"><i class="fas fa-search"></i> Buscar</button>
            </div>
            <div class="helper">
                <i class="fas fa-info-circle"></i> Ingresa tu indicativo para ver tu QSL
            </div>
        </div>

        <!-- RESULTADO -->
        <div class="result-container" id="resultContainer">
            <div class="message" id="resultMessage">
                <i class="fas fa-radio"></i>
                <span>Esperando tu búsqueda...</span>
            </div>
            <div class="qsl-card" id="qslCard" style="display: none;">
                <img id="qslImage" src="" alt="QSL" />
                <a id="downloadLink" class="download-btn" download>
                    <i class="fas fa-download"></i> Descargar QSL
                </a>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <div class="creator">
                <span>✧ CM7ADV - Cuba ✧</span>
                <br />
                <span style="font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 400;">ZMR-Cuba</span>
            </div>
            <div class="collab">
                <i class="fas fa-handshake"></i> Colaboradores: CO5ABC &amp; CO5WE <i class="fas fa-heart" style="color: #c44536;"></i>
            </div>
            <div style="font-size: 0.8rem; opacity: 0.7; margin-top: 4px;">
                <i class="fas fa-code"></i> Hecho con <i class="fas fa-coffee"></i> y <i class="fas fa-umbrella-beach"></i>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ================================================================
            //  BASE DE DATOS DE QSLs (cargando desde tu repositorio GitHub)
            //  Todas las imágenes se sirven en formato RAW desde:
            //  https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/
            // ================================================================
            const qslDatabase = {
                // --- Estaciones principales y colaboradores ---
                "CM7ADV": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CM7ADV.jpg",
                "CO5ABC": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CO5ABC.jpg",
                "CO5WE": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CO5WE.jpg",

                // --- Otras estaciones que tienes en tu carpeta img ---
                "CA4NDW": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CA4NDW-1.jpg",
                "AD4C": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/AD4C.jpg",
                "CA2LPO": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CA2LPO.jpg",
                "CA4DHR": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CA4DHR.jpg",
                "6CA4NDW": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/6CA4NDW-19.jpg",

                // ============================================================
                //  ✏️ AGREGAR MÁS INDICATIVOS AQUÍ:
                //  Copia esta línea y cambia "INDICATIVO" y "archivo.jpg"
                //  "INDICATIVO": "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/archivo.jpg",
                // ============================================================
            };

            // --- ELEMENTOS DOM ---
            const input = document.getElementById('callsignInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultContainer = document.getElementById('resultContainer');
            const resultMessage = document.getElementById('resultMessage');
            const qslCard = document.getElementById('qslCard');
            const qslImage = document.getElementById('qslImage');
            const downloadLink = document.getElementById('downloadLink');

            // --- FUNCIÓN PRINCIPAL DE BÚSQUEDA ---
            function buscarQSL() {
                let callsign = input.value.trim().toUpperCase();

                // Limpiar espacios y caracteres extraños (solo letras y números)
                callsign = callsign.replace(/[^A-Z0-9]/g, '');

                if (callsign === '') {
                    mostrarMensaje('📻', 'Por favor, ingresa un indicativo válido.');
                    return;
                }

                // Buscar en la base de datos
                const imageUrl = qslDatabase[callsign];

                if (imageUrl) {
                    // Mostrar la QSL
                    mostrarQSL(callsign, imageUrl);
                } else {
                    // No encontrado: mensaje cordial
                    mostrarMensaje('🌊', `¡Hola ${callsign}! Aún no tenemos tu QSL en nuestro sistema. ¡Contacta a CM7ADV para agregarla!`);
                }
            }

            // --- MOSTRAR MENSAJE (sin QSL) ---
            function mostrarMensaje(icono, texto) {
                resultMessage.style.display = 'block';
                resultMessage.innerHTML = `<i class="fas ${icono}"></i><span>${texto}</span>`;
                qslCard.style.display = 'none';
                // Limpiar imagen para evitar mostrar la anterior
                qslImage.src = '';
                downloadLink.href = '#';
            }

            // --- MOSTRAR QSL CON DESCARGA ---
            function mostrarQSL(callsign, url) {
                resultMessage.style.display = 'none';
                qslCard.style.display = 'flex';

                // Configurar imagen
                qslImage.src = url;
                qslImage.alt = `QSL de ${callsign}`;

                // Configurar enlace de descarga: usando fetch para obtener el blob
                // y forzar la descarga con el nombre correcto.
                async function prepararDescarga() {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Error al obtener la imagen');
                        const blob = await response.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        // Determinar extensión desde el Content-Type o la URL
                        let ext = 'jpg';
                        if (blob.type.includes('png')) ext = 'png';
                        else if (blob.type.includes('jpeg')) ext = 'jpg';
                        else if (blob.type.includes('gif')) ext = 'gif';
                        downloadLink.href = blobUrl;
                        downloadLink.download = `QSL_${callsign}.${ext}`;
                    } catch (error) {
                        // Fallback: usar la URL directa (puede funcionar en algunos navegadores)
                        console.warn('Descarga con fetch falló, usando URL directa.', error);
                        downloadLink.href = url;
                        downloadLink.download = `QSL_${callsign}.jpg`;
                    }
                }
                prepararDescarga();

                // También configuramos el enlace inmediatamente por si el usuario hace clic rápido
                downloadLink.href = url;
                downloadLink.download = `QSL_${callsign}.jpg`;
            }

            // --- EVENTOS ---
            searchBtn.addEventListener('click', buscarQSL);

            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    buscarQSL();
                }
            });

            // Al cargar la página, enfocar el input y mostrar mensaje inicial
            window.addEventListener('load', function() {
                input.focus();
                mostrarMensaje('fa-radio', 'Esperando tu búsqueda...');
            });

        })();
    </script>

</body>
</html>
