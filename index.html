<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CL7ADV QSL System - Caribbean QSL Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(135deg, #023047, #006994, #00B4D8);
            min-height: 100vh;
            color: white;
        }
        .header {
            background: rgba(0,0,0,0.6);
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 1rem;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
        }
        .search-box button {
            padding: 1rem 2rem;
            border-radius: 50px;
            background: #FF6B6B;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .qsl-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .qsl-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            color: #333;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .qsl-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .qsl-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .qsl-info {
            padding: 1rem;
        }
        .qsl-info h3 {
            color: #2A9D8F;
        }
        .btn-download {
            background: #2A9D8F;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            margin-top: 0.5rem;
            cursor: pointer;
            width: 100%;
        }
        .loading, .error {
            text-align: center;
            padding: 2rem;
            font-size: 1.2rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            background: rgba(0,0,0,0.5);
        }
        @media (max-width: 700px) {
            .qsl-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏝️ CL7ADV - CARIBBEAN QSL NETWORK</h1>
        <p>73's desde el Caribe | Sistema de búsqueda rápida de QSLs</p>
    </div>

    <div class="container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por indicativo (CM7ADV, KP4ABC...) o código POTA (CM-0001)..." autocomplete="off">
            <button id="searchBtn">🔍 BUSCAR QSLs</button>
        </div>
        <div id="results" class="results">
            <div class="loading">🌊 Cargando QSLs desde el repositorio...</div>
        </div>
    </div>

    <footer>
        <p>📡 QSLs alojadas en: <strong>github.com/cl7adv/cl7adv-qsl/img/</strong> | 📻 CL7ADV</p>
    </footer>

    <script>
        // Configuración de tu repositorio
        const GITHUB_USER = "cl7adv";
        const REPO_NAME = "cl7adv-qsl";
        const RAW_BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/img/`;
        
        let qslDatabase = [];

        // Cargar el índice de QSLs
        async function cargarQSLs() {
            try {
                // Intentar cargar el archivo index.json que DEBES crear en /img/index.json
                const response = await fetch(`${RAW_BASE}index.json`);
                if (!response.ok) throw new Error("Index no encontrado");
                const data = await response.json();
                qslDatabase = data.qsls;
                mostrarResultados(qslDatabase, "📚 TODAS LAS QSLS DISPONIBLES");
                return true;
            } catch (error) {
                console.warn("No se encontró index.json, usando datos de ejemplo");
                // Datos de ejemplo para que veas cómo funciona (cámbialos por tus QSLs reales)
                qslDatabase = [
                    {
                        id: "qsl001",
                        indicativo: "CL7ADV",
                        tipo: "POTA",
                        parque: "CM-0001",
                        nombre_parque: "Parque Alejandro de Humboldt",
                        contacto: null,
                        fecha: "2024-10-15",
                        banda: "20M",
                        modo: "SSB",
                        imagen_url: "https://picsum.photos/id/104/400/300",
                        descripcion: "Activación desde Cuba"
                    },
                    {
                        id: "qsl002",
                        indicativo: "CL7ADV",
                        tipo: "CONTACTO",
                        contacto: "KP4ABC",
                        fecha: "2024-10-15",
                        banda: "20M",
                        modo: "SSB",
                        imagen_url: "https://picsum.photos/id/96/400/300",
                        descripcion: "QSO con Puerto Rico"
                    }
                ];
                mostrarResultados(qslDatabase, "📚 QSLs de demostración (crea /img/index.json con tus QSLs reales)");
                return false;
            }
        }

        function buscarQSLs(texto) {
            if (!texto) return qslDatabase;
            texto = texto.toUpperCase().trim();
            
            return qslDatabase.filter(qsl => {
                // Buscar por indicativo
                if (qsl.indicativo.toUpperCase().includes(texto)) return true;
                // Buscar por código POTA
                if (qsl.parque && qsl.parque.toUpperCase().includes(texto)) return true;
                // Buscar por contacto
                if (qsl.contacto && qsl.contacto.toUpperCase().includes(texto)) return true;
                return false;
            });
        }

        function mostrarResultados(qsls, titulo) {
            const container = document.getElementById("results");
            if (!qsls || qsls.length === 0) {
                container.innerHTML = `<div class="error">❌ No se encontraron QSLs para esa búsqueda.<br>📡 Prueba con: CL7ADV, KP4ABC, CM-0001</div>`;
                return;
            }

            let html = `<h2 style="margin-bottom:1rem;">${titulo} (${qsls.length})</h2>`;
            html += `<div class="qsl-grid">`;
            
            qsls.forEach(qsl => {
                const tipoIcono = qsl.tipo === "POTA" ? "🏞️" : "📻";
                const tituloQSL = qsl.tipo === "POTA" ? `POTA: ${qsl.parque}` : `QSO con: ${qsl.contacto}`;
                const imagenSrc = qsl.imagen_url || "https://picsum.photos/id/42/400/300";
                
                html += `
                    <div class="qsl-card" onclick="descargarQSL('${qsl.id}')">
                        <img src="${imagenSrc}" alt="QSL ${qsl.indicativo}" loading="lazy" onerror="this.src='https://picsum.photos/id/20/400/300'">
                        <div class="qsl-info">
                            <h3>${tipoIcono} ${qsl.indicativo}</h3>
                            <p><strong>${tituloQSL}</strong></p>
                            <p>📅 ${qsl.fecha} | 🎚️ ${qsl.banda} | 📡 ${qsl.modo}</p>
                            <p>📝 ${qsl.descripcion || "QSL disponible"}</p>
                            <button class="btn-download" onclick="event.stopPropagation(); descargarQSL('${qsl.id}')">📥 DESCARGAR QSL</button>
                        </div>
                    </div>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
        }

        function descargarQSL(id) {
            const qsl = qslDatabase.find(q => q.id === id);
            if (qsl && qsl.imagen_url) {
                window.open(qsl.imagen_url, '_blank');
                alert(`🌊 Descargando QSL de ${qsl.indicativo}\n📅 ${qsl.fecha}\n¡73's desde el Caribe!`);
            } else {
                alert("📻 QSL electrónica disponible. Contacta a CL7ADV para obtenerla.");
            }
        }

        // Eventos
        document.getElementById("searchBtn").addEventListener("click", () => {
            const texto = document.getElementById("searchInput").value;
            const resultados = buscarQSLs(texto);
            const titulo = texto ? `🔍 Resultados para "${texto}"` : "📚 TODAS LAS QSLS";
            mostrarResultados(resultados, titulo);
        });
        
        document.getElementById("searchInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") document.getElementById("searchBtn").click();
        });

        // Inicializar
        cargarQSLs();
    </script>
</body>
</html>
