<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QSL Caribe 3D · Buscador de QSLs</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <style>
        /* ============================================================
           RESET Y ESTILOS GLOBALES
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: #0f0e17;
            perspective: 1200px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(255, 140, 0, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 180, 255, 0.15) 0%, transparent 60%),
                linear-gradient(145deg, #0f0e17 0%, #1a1a2e 40%, #16213e 80%, #0f0e17 100%);
            z-index: -2;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            z-index: -1;
        }

        /* Elementos flotantes */
        .floating {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            font-size: 4rem;
            opacity: 0.12;
            filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.3));
            animation: float3D 8s ease-in-out infinite alternate;
        }
        .floating-1 {
            top: 10%;
            left: 5%;
            animation-delay: 0s;
            font-size: 6rem;
        }
        .floating-2 {
            bottom: 15%;
            right: 5%;
            animation-delay: 2s;
            font-size: 5rem;
        }
        .floating-3 {
            top: 30%;
            right: 8%;
            animation-delay: 4s;
            font-size: 3.5rem;
        }
        .floating-4 {
            bottom: 30%;
            left: 8%;
            animation-delay: 1s;
            font-size: 4.5rem;
        }

        @keyframes float3D {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                transform: translateY(-30px) rotate(10deg) scale(1.1);
            }
        }

        /* Tarjeta principal 3D */
        .card-3d {
            max-width: 880px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 48px;
            padding: 2.5rem 2.5rem 2rem;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 80px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transform: rotateY(4deg) rotateX(2deg) translateZ(20px);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 2;
            animation: cardEntrance 0.8s ease-out;
        }
        .card-3d:hover {
            transform: rotateY(2deg) rotateX(1deg) translateZ(30px);
            box-shadow: 0 60px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: rotateY(10deg) rotateX(5deg) translateZ(-100px);
            }
            100% {
                opacity: 1;
                transform: rotateY(4deg) rotateX(2deg) translateZ(20px);
            }
        }

        /* Sello QSL */
        .stamp-modern {
            position: absolute;
            top: -10px;
            right: 30px;
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-style: italic;
            color: rgba(255, 200, 100, 0.07);
            transform: rotate(15deg);
            text-shadow: 0 0 40px rgba(255, 200, 100, 0.05);
            pointer-events: none;
            z-index: 0;
            letter-spacing: 8px;
        }

        /* Header */
        .header-modern {
            text-align: center;
            margin-bottom: 1.8rem;
            position: relative;
            z-index: 1;
        }
        .header-modern h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: 3.8rem;
            background: linear-gradient(135deg, #f9d976, #f39c12, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
            text-shadow: 0 0 60px rgba(243, 156, 18, 0.2);
            margin-bottom: -0.2rem;
            line-height: 1.1;
        }
        .header-modern .subtitle {
            font-weight: 700;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.04);
            display: inline-block;
            padding: 0.4rem 1.8rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 0.3rem;
        }
        .header-modern .sun-icon {
            font-size: 2.4rem;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(255, 200, 50, 0.2));
            animation: pulseGlow 4s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(1) rotate(0deg);
                filter: drop-shadow(0 0 20px rgba(255, 200, 50, 0.15));
            }
            50% {
                transform: scale(1.1) rotate(8deg);
                filter: drop-shadow(0 0 40px rgba(255, 200, 50, 0.3));
            }
        }

        /* Buscador */
        .search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            margin: 1rem 0 1.8rem;
            position: relative;
            z-index: 3;
        }
        .search-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
        }
        .search-box input {
            flex: 1 1 240px;
            padding: 0.9rem 1.8rem;
            border: none;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .search-box input::placeholder {
            text-transform: none;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0;
        }
        .search-box input:focus {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 4px 12px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(243, 156, 18, 0.3);
            border-color: rgba(243, 156, 18, 0.2);
        }
        .search-box button {
            padding: 0.9rem 2.4rem;
            border: none;
            border-radius: 60px;
            background: linear-gradient(145deg, #f39c12, #e67e22);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 8px 24px rgba(243, 156, 18, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .search-box button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 32px rgba(243, 156, 18, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .search-box button:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 4px 12px rgba(243, 156, 18, 0.3);
        }
        .search-box button:focus-visible {
            outline: 2px solid rgba(243, 156, 18, 0.6);
            outline-offset: 3px;
        }

        .suggestions {
            list-style: none;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 0.3rem 0;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            max-width: 400px;
            display: none;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: -0.2rem;
        }
        .suggestions li {
            padding: 0.6rem 1.5rem;
            cursor: pointer;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            transition: 0.15s;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .suggestions li:last-child {
            border-bottom: none;
        }
        .suggestions li:hover,
        .suggestions li:focus {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .suggestions li small {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.3);
        }

        .helper {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.02);
            padding: 0.2rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Resultados */
        .result-container {
            min-height: 200px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            padding: 1.8rem 1.5rem;
            margin: 1rem 0 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            position: relative;
        }

        .result-container .message {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 1rem;
        }
        .result-container .message i {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 0.5rem;
            color: #f39c12;
            filter: drop-shadow(0 0 20px rgba(243, 156, 18, 0.2));
        }

        /* Grid */
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.5rem;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }
        .grid-item {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(6px);
            border-radius: 20px;
            padding: 12px 12px 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }
        .grid-item:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(243, 156, 18, 0.2);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }
        .grid-item:focus-visible {
            outline: 2px solid #f39c12;
            outline-offset: 4px;
        }
        .grid-item img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 12px;
            background: #1a1a2e;
            display: block;
            transition: opacity 0.3s;
        }
        .grid-item .callsign {
            font-weight: 700;
            font-size: 1rem;
            color: #fff;
            margin-top: 8px;
        }
        .grid-item .banda {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Detalle */
        .detail-view {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }
        .detail-view .polaroid {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(6px);
            padding: 16px 16px 50px;
            border-radius: 16px;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 100%;
            display: inline-block;
            position: relative;
            transition: 0.3s;
        }
        .detail-view .polaroid:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }
        .detail-view .polaroid img {
            display: block;
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            object-fit: contain;
            background: #1a1a2e;
            filter: brightness(1.05) contrast(1.05);
            transition: opacity 0.3s;
        }
        .detail-view .polaroid .stamp {
            position: absolute;
            bottom: 60px;
            right: 20px;
            background: rgba(243, 156, 18, 0.15);
            backdrop-filter: blur(4px);
            color: #f39c12;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            padding: 0.1rem 1rem;
            border-radius: 30px;
            transform: rotate(12deg);
            border: 1px solid rgba(243, 156, 18, 0.1);
            pointer-events: none;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }

        .detail-view .meta {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem 1.5rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1.6rem;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .detail-view .meta i {
            margin-right: 6px;
            color: #f39c12;
        }

        .detail-view .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 0.2rem;
        }
        .detail-view .actions .download-btn {
            background: linear-gradient(145deg, #2d8f6f, #1a6b52);
            color: #fff;
            padding: 0.7rem 2rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(45, 143, 111, 0.3);
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-view .actions .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(45, 143, 111, 0.4);
        }
        .detail-view .actions .download-btn:active {
            transform: translateY(2px);
        }
        .detail-view .actions .share-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .detail-view .actions .share-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .detail-view .actions .nav-btn {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.5);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .detail-view .actions .nav-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
        }
        .detail-view .actions .nav-btn:disabled {
            opacity: 0.2;
            cursor: default;
            pointer-events: none;
        }

        .download-count {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 0.2rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.1rem 1.2rem;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .back-to-grid {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            transition: 0.2s;
            margin-bottom: 0.5rem;
        }
        .back-to-grid:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.05);
            border-top-color: #f39c12;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 1rem auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Footer */
        .footer-modern {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .footer-modern .creator {
            font-weight: 700;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
        }
        .footer-modern .creator span {
            background: rgba(255, 255, 255, 0.02);
            padding: 0 0.8rem;
            border-radius: 30px;
        }
        .footer-modern .collab {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.15);
        }
        .footer-modern .collab i {
            color: #f39c12;
            margin: 0 4px;
        }
        .footer-modern .badge {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            font-size: 0.75rem;
        }
        .footer-modern .badge i {
            margin-right: 4px;
        }

        /* Animaciones */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .card-3d {
                padding: 1.5rem 1rem;
                transform: rotateY(2deg) rotateX(1deg) translateZ(10px);
            }
            .card-3d:hover {
                transform: rotateY(1deg) rotateX(0deg) translateZ(15px);
            }
            .header-modern h1 {
                font-size: 2.6rem;
            }
            .header-modern .subtitle {
                font-size: 0.9rem;
                padding: 0.2rem 1rem;
            }
            .search-box input {
                font-size: 0.95rem;
                padding: 0.7rem 1.2rem;
            }
            .search-box button {
                font-size: 0.95rem;
                padding: 0.7rem 1.4rem;
            }
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 1rem;
            }
            .grid-item img {
                height: 90px;
            }
            .detail-view .polaroid img {
                max-height: 220px;
            }
            .detail-view .polaroid {
                padding: 10px 10px 30px;
            }
            .detail-view .meta {
                font-size: 0.8rem;
                flex-direction: column;
                align-items: center;
                gap: 0.3rem;
            }
            .footer-modern .creator {
                font-size: 1rem;
            }
            .floating {
                font-size: 2.5rem;
                opacity: 0.08;
            }
            .detail-view .actions .nav-btn {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 400px) {
            .search-box {
                flex-direction: column;
                align-items: stretch;
            }
            .search-box input {
                text-align: center;
            }
            .suggestions {
                max-width: 100%;
            }
            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- Elementos flotantes -->
    <div class="floating floating-1" aria-hidden="true">🌴</div>
    <div class="floating floating-2" aria-hidden="true">☕</div>
    <div class="floating floating-3" aria-hidden="true">🌊</div>
    <div class="floating floating-4" aria-hidden="true">⛵</div>

    <!-- Tarjeta principal -->
    <main class="card-3d" role="main">

        <div class="stamp-modern" aria-hidden="true">QSL</div>

        <header class="header-modern">
            <span class="sun-icon" aria-hidden="true"><i class="fas fa-sun"></i></span>
            <h1>QSL Caribe</h1>
            <div class="subtitle"><i class="fas fa-qrcode" aria-hidden="true"></i> Buscador de QSLs 3D</div>
        </header>

        <!-- Buscador -->
        <section class="search-section" aria-label="Buscador de QSLs">
            <div class="search-box" role="search">
                <label for="callsignInput" class="visually-hidden" style="position:absolute;width:1px;height:1px;overflow:hidden;">Indicativo</label>
                <input type="text" id="callsignInput" placeholder="Ej. CM7ADV, CO5..." maxlength="12" autofocus aria-autocomplete="list" aria-controls="suggestionsList" />
                <button id="searchBtn" aria-label="Buscar QSL"><i class="fas fa-search" aria-hidden="true"></i> Buscar</button>
            </div>
            <ul class="suggestions" id="suggestionsList" role="listbox"></ul>
            <div class="helper" aria-hidden="true">
                <i class="fas fa-info-circle"></i> Escribe el indicativo o parte de él
            </div>
        </section>

        <!-- Resultados -->
        <section class="result-container" id="resultContainer" aria-live="polite">
            <div class="message" id="resultMessage">
                <i class="fas fa-radio" aria-hidden="true"></i>
                <span>Esperando tu búsqueda...</span>
            </div>
            <div class="grid-view" id="gridView" style="display:none;" role="list"></div>
            <div class="detail-view" id="detailView" role="region" aria-label="Detalle de QSL">
                <button class="back-to-grid" id="backToGrid" style="display:none;" aria-label="Volver a la vista de todas las QSLs"><i class="fas fa-arrow-left" aria-hidden="true"></i> Ver todas</button>
                <figure class="polaroid">
                    <img id="qslImage" src="" alt="QSL" />
                    <span class="stamp" aria-hidden="true">QSL</span>
                </figure>
                <div class="meta" id="qslMeta"></div>
                <div class="actions">
                    <button class="nav-btn" id="prevQslBtn" aria-label="QSL anterior"><i class="fas fa-chevron-left"></i></button>
                    <a id="downloadLink" class="download-btn" download><i class="fas fa-download" aria-hidden="true"></i> Descargar</a>
                    <button class="share-btn" id="shareBtn" aria-label="Compartir enlace"><i class="fas fa-share-alt" aria-hidden="true"></i> Compartir</button>
                    <button class="nav-btn" id="nextQslBtn" aria-label="QSL siguiente"><i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="download-count" id="downloadCount"><i class="fas fa-download" aria-hidden="true"></i> Descargas: 0</div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer-modern">
            <div class="creator"><span>✧ CM7ADV - Cuba ✧</span></div>
            <div class="collab">
                <i class="fas fa-handshake" aria-hidden="true"></i> Colaboradores: CO5ABC &amp; CO5WE <i class="fas fa-heart" aria-hidden="true"></i>
            </div>
            <div class="badge">
                <span><i class="fas fa-code" aria-hidden="true"></i> Hecho con <i class="fas fa-coffee" aria-hidden="true"></i> y <i class="fas fa-umbrella-beach" aria-hidden="true"></i></span>
            </div>
        </footer>
    </main>

    <!-- ============================================================
         JAVASCRIPT COMPLETO (carga desde GitHub + toda la lógica)
         ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. CONFIGURACIÓN
            // ============================================================
            const GITHUB_API_URL = 'https://api.github.com/repos/cl7adv/cl7adv-qsl/contents/img';

            // ============================================================
            // 2. DOM REFS
            // ============================================================
            const input = document.getElementById('callsignInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultMessage = document.getElementById('resultMessage');
            const gridView = document.getElementById('gridView');
            const detailView = document.getElementById('detailView');
            const qslImage = document.getElementById('qslImage');
            const qslMeta = document.getElementById('qslMeta');
            const downloadLink = document.getElementById('downloadLink');
            const shareBtn = document.getElementById('shareBtn');
            const downloadCountSpan = document.getElementById('downloadCount');
            const suggestionsList = document.getElementById('suggestionsList');
            const backToGridBtn = document.getElementById('backToGrid');
            const prevBtn = document.getElementById('prevQslBtn');
            const nextBtn = document.getElementById('nextQslBtn');

            // ============================================================
            // 3. ESTADO
            // ============================================================
            let qslDatabase = {};
            let dbLoaded = false;
            let dbLoading = false;
            let currentQsList = [];
            let currentQslIndex = 0;
            let currentCallsign = '';

            // ============================================================
            // 4. UTILIDADES
            // ============================================================
            function normalize(str) {
                return str.trim().toUpperCase().replace(/[^A-Z0-9]/g, '');
            }

            function getDownloadKey(callsign, index) {
                return `qsl_dl_${callsign}_${index}`;
            }

            function getDownloadCount(callsign, index) {
                const key = getDownloadKey(callsign, index);
                return parseInt(localStorage.getItem(key)) || 0;
            }

            function incrementDownloadCount(callsign, index) {
                const key = getDownloadKey(callsign, index);
                const current = getDownloadCount(callsign, index);
                localStorage.setItem(key, current + 1);
                return current + 1;
            }

            // ============================================================
            // 5. CARGA DINÁMICA DESDE GITHUB
            // ============================================================
            async function cargarQSLsDesdeGitHub() {
                if (dbLoaded) return qslDatabase;
                if (dbLoading) {
                    await new Promise(resolve => {
                        const check = () => {
                            if (dbLoaded || !dbLoading) resolve();
                            else setTimeout(check, 100);
                        };
                        check();
                    });
                    return qslDatabase;
                }

                dbLoading = true;
                try {
                    const response = await fetch(GITHUB_API_URL);
                    if (!response.ok) throw new Error(`Error ${response.status}: ${response.statusText}`);
                    const files = await response.json();

                    const imageFiles = files.filter(file => {
                        const ext = file.name.split('.').pop().toLowerCase();
                        return ['jpg', 'jpeg', 'png'].includes(ext);
                    });

                    const newDb = {};
                    imageFiles.forEach(file => {
                        let callsign = file.name.replace(/\.[^.]+$/, '');
                        callsign = callsign.replace(/-\d+$/, '');
                        callsign = callsign.toUpperCase();

                        if (!newDb[callsign]) {
                            newDb[callsign] = [];
                        }

                        let banda = '';
                        let modo = '';
                        const bandaMatch = file.name.match(/(\d+[mMcC])/);
                        if (bandaMatch) banda = bandaMatch[1];
                        const modoMatch = file.name.match(/(SSB|CW|FT8|FM|AM|DMR)/i);
                        if (modoMatch) modo = modoMatch[1].toUpperCase();

                        newDb[callsign].push({
                            url: file.download_url,
                            banda: banda,
                            modo: modo,
                            operador: callsign,
                            fecha: '',
                            _filename: file.name
                        });
                    });

                    qslDatabase = newDb;
                    dbLoaded = true;
                    dbLoading = false;
                    return qslDatabase;
                } catch (error) {
                    console.error('Error cargando QSLs desde GitHub:', error);
                    dbLoading = false;
                    // Fallback a base de datos estática de respaldo
                    qslDatabase = getFallbackDatabase();
                    dbLoaded = true;
                    return qslDatabase;
                }
            }

            function getFallbackDatabase() {
                return {
                    "CM7ADV": [
                        { url: "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CM7ADV.jpg", banda: "40m", modo: "SSB", operador: "CM7ADV (Adrián)", fecha: "2025-01-15" }
                    ],
                    "CO5ABC": [
                        { url: "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CO5ABC.jpg", banda: "20m", modo: "CW", operador: "CO5ABC", fecha: "2024-12-10" }
                    ],
                    "CO5WE": [
                        { url: "https://raw.githubusercontent.com/cl7adv/cl7adv-qsl/main/img/CO5WE.jpg", banda: "15m", modo: "FT8", operador: "CO5WE", fecha: "2025-02-20" }
                    ]
                };
            }

            // ============================================================
            // 6. RENDER FUNCTIONS
            // ============================================================
            function mostrarMensaje(icono, texto) {
                resultMessage.style.display = 'block';
                resultMessage.innerHTML = `<i class="fas ${icono}" aria-hidden="true"></i><span>${texto}</span>`;
                gridView.style.display = 'none';
                detailView.style.display = 'none';
                suggestionsList.style.display = 'none';
            }

            function mostrarGrid(qsls, callsign) {
                if (!qsls || qsls.length === 0) {
                    mostrarMensaje('fa-sad-tear', 'No se encontraron QSLs.');
                    return;
                }
                resultMessage.style.display = 'none';
                gridView.style.display = 'grid';
                detailView.style.display = 'none';
                gridView.innerHTML = '';
                currentQsList = qsls;
                currentCallsign = callsign || 'QSL';

                const fragment = document.createDocumentFragment();

                qsls.forEach((qsl, index) => {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.setAttribute('role', 'listitem');
                    item.setAttribute('tabindex', '0');
                    const displayName = qsl._callsign || callsign || 'QSL';
                    const img = document.createElement('img');
                    img.dataset.src = qsl.url;
                    img.alt = `QSL de ${displayName}`;
                    img.loading = 'lazy';
                    img.style.opacity = '0';
                    img.style.background = '#1a1a2e';

                    const callsignDiv = document.createElement('div');
                    callsignDiv.className = 'callsign';
                    callsignDiv.textContent = displayName;

                    const bandaDiv = document.createElement('div');
                    bandaDiv.className = 'banda';
                    bandaDiv.textContent = `${qsl.banda || ''} ${qsl.modo || ''}`.trim();

                    item.appendChild(img);
                    item.appendChild(callsignDiv);
                    item.appendChild(bandaDiv);

                    item.addEventListener('click', () => {
                        mostrarDetalle(qsls, index, displayName);
                    });
                    item.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            mostrarDetalle(qsls, index, displayName);
                        }
                    });

                    fragment.appendChild(item);
                });

                gridView.appendChild(fragment);

                if ('IntersectionObserver' in window) {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const img = entry.target;
                                if (img.dataset.src) {
                                    img.src = img.dataset.src;
                                    img.onload = () => { img.style.opacity = '1'; };
                                    delete img.dataset.src;
                                }
                                observer.unobserve(img);
                            }
                        });
                    }, { rootMargin: '0px 0px 100px 0px' });
                    gridView.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
                } else {
                    gridView.querySelectorAll('img[data-src]').forEach(img => {
                        img.src = img.dataset.src;
                        delete img.dataset.src;
                        img.onload = () => { img.style.opacity = '1'; };
                    });
                }
            }

            function mostrarDetalle(qsls, index, callsign) {
                if (!qsls || qsls.length === 0 || !qsls[index]) return;
                const qsl = qsls[index];
                const displayName = callsign || 'QSL';

                resultMessage.style.display = 'none';
                gridView.style.display = 'none';
                detailView.style.display = 'flex';
                currentQsList = qsls;
                currentQslIndex = index;
                currentCallsign = displayName;

                if (qsls.length > 1) {
                    backToGridBtn.style.display = 'inline-block';
                    backToGridBtn.innerHTML = `<i class="fas fa-arrow-left" aria-hidden="true"></i> Ver todas (${qsls.length})`;
                } else {
                    backToGridBtn.style.display = 'none';
                }

                prevBtn.disabled = (index === 0);
                nextBtn.disabled = (index === qsls.length - 1);
                prevBtn.style.display = qsls.length > 1 ? 'inline-flex' : 'none';
                nextBtn.style.display = qsls.length > 1 ? 'inline-flex' : 'none';

                qslImage.alt = `QSL de ${displayName}`;
                qslImage.src = '';
                qslImage.style.opacity = '0';

                const spinner = document.createElement('div');
                spinner.className = 'spinner';
                spinner.id = 'imgSpinner';
                const parent = qslImage.parentNode;
                parent.insertBefore(spinner, qslImage);

                const img = new Image();
                img.onload = () => {
                    qslImage.src = img.src;
                    qslImage.style.opacity = '1';
                    const sp = document.getElementById('imgSpinner');
                    if (sp) sp.remove();
                };
                img.onerror = () => {
                    qslImage.src = '';
                    qslImage.alt = `Error al cargar QSL de ${displayName}`;
                    const sp = document.getElementById('imgSpinner');
                    if (sp) sp.remove();
                };
                img.src = qsl.url;

                let metaHTML = '';
                if (qsl.operador) metaHTML += `<span><i class="fas fa-user" aria-hidden="true"></i> ${qsl.operador}</span>`;
                if (qsl.banda) metaHTML += `<span><i class="fas fa-signal" aria-hidden="true"></i> ${qsl.banda}</span>`;
                if (qsl.modo) metaHTML += `<span><i class="fas fa-wave-square" aria-hidden="true"></i> ${qsl.modo}</span>`;
                if (qsl.fecha) metaHTML += `<span><i class="fas fa-calendar-alt" aria-hidden="true"></i> ${qsl.fecha}</span>`;
                qslMeta.innerHTML = metaHTML || '<span><i class="fas fa-tag" aria-hidden="true"></i> QSL confirmada</span>';

                const dlCount = getDownloadCount(displayName, index);
                downloadCountSpan.innerHTML = `<i class="fas fa-download" aria-hidden="true"></i> Descargas: ${dlCount}`;

                downloadLink.href = qsl.url;
                downloadLink.download = `QSL_${displayName}.jpg`;
                downloadLink.onclick = function(e) {
                    const newCount = incrementDownloadCount(displayName, index);
                    downloadCountSpan.innerHTML = `<i class="fas fa-download" aria-hidden="true"></i> Descargas: ${newCount}`;
                };

                shareBtn.onclick = function() {
                    const shareUrl = window.location.href.split('?')[0] + `?qsl=${encodeURIComponent(displayName)}`;
                    if (navigator.share) {
                        navigator.share({
                            title: `QSL de ${displayName}`,
                            text: `¡Mira esta QSL de ${displayName}!`,
                            url: shareUrl
                        }).catch(() => {});
                    } else {
                        navigator.clipboard.writeText(shareUrl).then(() => {
                            alert('Enlace copiado al portapapeles: ' + shareUrl);
                        }).catch(() => {
                            prompt('Copia este enlace:', shareUrl);
                        });
                    }
                };

                suggestionsList.style.display = 'none';
            }

            // ============================================================
            // 7. BÚSQUEDA
            // ============================================================
            async function buscarQSL() {
                const raw = input.value.trim();
                const clean = normalize(raw);
                if (clean === '') {
                    mostrarMensaje('fa-radio', 'Por favor, ingresa un indicativo válido.');
                    return;
                }

                const db = await cargarQSLsDesdeGitHub();
                const dbKeys = Object.keys(db);

                const matchedKeys = dbKeys.filter(key =>
                    key.includes(clean) || clean.includes(key)
                );

                if (matchedKeys.length === 0) {
                    mostrarMensaje('fa-sad-tear', `¡Hola ${clean}! Aún no tenemos tu QSL en el sistema. Contacta a CM7ADV para agregarla.`);
                    return;
                }

                if (matchedKeys.length === 1) {
                    const key = matchedKeys[0];
                    const qsls = db[key];
                    qsls.forEach(q => q._callsign = key);
                    if (qsls.length === 1) {
                        mostrarDetalle(qsls, 0, key);
                    } else {
                        mostrarGrid(qsls, key);
                    }
                    return;
                }

                let allQSLs = [];
                matchedKeys.forEach(key => {
                    const qsls = db[key];
                    qsls.forEach(q => {
                        allQSLs.push({
                            ...q,
                            _callsign: key
                        });
                    });
                });

                if (allQSLs.length === 0) {
                    mostrarMensaje('fa-sad-tear', `No se encontraron QSLs para ${clean}.`);
                    return;
                }

                mostrarGrid(allQSLs, '');
            }

            // ============================================================
            // 8. SUGERENCIAS CON DEBOUNCE
            // ============================================================
            let debounceTimer;

            function mostrarSugerencias(matches) {
                suggestionsList.innerHTML = '';
                matches.slice(0, 8).forEach(key => {
                    const li = document.createElement('li');
                    li.setAttribute('role', 'option');
                    li.setAttribute('tabindex', '0');
                    const count = qslDatabase[key].length;
                    li.innerHTML = `${key} <small>${count} QSL${count>1?'s':''}</small>`;
                    li.addEventListener('click', () => {
                        input.value = key;
                        suggestionsList.style.display = 'none';
                        buscarQSL();
                    });
                    li.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            input.value = key;
                            suggestionsList.style.display = 'none';
                            buscarQSL();
                        }
                    });
                    suggestionsList.appendChild(li);
                });
                suggestionsList.style.display = 'block';
            }

            input.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                const raw = this.value.trim();
                const clean = normalize(raw);
                if (clean.length < 2) {
                    suggestionsList.style.display = 'none';
                    return;
                }
                debounceTimer = setTimeout(async () => {
                    const db = await cargarQSLsDesdeGitHub();
                    const matches = Object.keys(db).filter(key =>
                        key.includes(clean) || clean.includes(key)
                    );
                    if (matches.length > 0) {
                        mostrarSugerencias(matches);
                    } else {
                        suggestionsList.style.display = 'none';
                    }
                }, 200);
            });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-section')) {
                    suggestionsList.style.display = 'none';
                }
            });

            // ============================================================
            // 9. EVENT LISTENERS
            // ============================================================
            searchBtn.addEventListener('click', buscarQSL);
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    buscarQSL();
                }
            });

            backToGridBtn.addEventListener('click', function() {
                if (currentQsList && currentQsList.length > 0) {
                    let callsign = currentCallsign || 'QSL';
                    if (currentQsList.length > 0 && currentQsList[0]._callsign) {
                        callsign = currentQsList[0]._callsign;
                    }
                    mostrarGrid(currentQsList, callsign);
                } else {
                    detailView.style.display = 'none';
                    mostrarMensaje('fa-radio', 'Esperando tu búsqueda...');
                }
            });

            prevBtn.addEventListener('click', function() {
                if (currentQsList && currentQslIndex > 0) {
                    const newIndex = currentQslIndex - 1;
                    const displayName = currentQsList[newIndex]._callsign || currentCallsign || 'QSL';
                    mostrarDetalle(currentQsList, newIndex, displayName);
                }
            });

            nextBtn.addEventListener('click', function() {
                if (currentQsList && currentQslIndex < currentQsList.length - 1) {
                    const newIndex = currentQslIndex + 1;
                    const displayName = currentQsList[newIndex]._callsign || currentCallsign || 'QSL';
                    mostrarDetalle(currentQsList, newIndex, displayName);
                }
            });

            // ============================================================
            // 10. CARGA INICIAL
            // ============================================================
            window.addEventListener('load', async function() {
                input.focus();
                mostrarMensaje('fa-radio', 'Cargando QSLs desde GitHub...');

                const db = await cargarQSLsDesdeGitHub();
                const count = Object.keys(db).length;
                mostrarMensaje('fa-radio', `✅ ${count} indicativos cargados. Esperando tu búsqueda...`);

                const params = new URLSearchParams(window.location.search);
                const qslParam = params.get('qsl');
                if (qslParam) {
                    const key = normalize(qslParam);
                    const matched = Object.keys(db).find(k => k.includes(key) || key.includes(k));
                    if (matched) {
                        input.value = matched;
                        buscarQSL();
                    } else {
                        mostrarMensaje('fa-sad-tear', `No se encontró la QSL "${qslParam}"`);
                    }
                }
            });

        })();
    </script>
